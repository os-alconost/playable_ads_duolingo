<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="ad.size" content="width=360,height=640">
<title>Duolingo Easter Playable Ad</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --green:#58CC02;--green-dk:#46a302;--green-deep:#2b7a00;
  --bg:#1a1035;--card:rgba(255,255,255,.12);
  --white:#fff;--muted:rgba(255,255,255,.72);--dim:rgba(255,255,255,.35);
  --red:#FF4B4B;--blue:#1CB0F6;--gold:#FFC800;
  --pastel-yellow:#FFF9C4;--pastel-pink:#F8BBD0;--pastel-blue:#BBDEFB;--pastel-green:#C8E6C9;--pastel-purple:#E1BEE7;--pastel-orange:#FFE0B2;
  --easter-bg:linear-gradient(180deg,#58CC02 0%,#3da600 100%);
  --r:16px;
}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Nunito',sans-serif;background:var(--bg);color:var(--white)}
.ad{width:100%;height:100%;max-width:420px;margin:0 auto;position:relative;overflow:hidden}

.scr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 24px;opacity:0;pointer-events:none;transition:opacity .45s,transform .45s;transform:translateX(50px)}
.scr.on{opacity:1;pointer-events:auto;transform:translateX(0)}
.scr.off{opacity:0;transform:translateX(-50px)}

/* INTRO */
.intro-bg{background:linear-gradient(180deg,#1a1035 0%,#2d1b69 50%,#1a1035 100%)}
.owl{width:140px;animation:bob 2.5s ease infinite}
@keyframes bob{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-8px) rotate(-3deg)}}
.easter-eggs-deco{font-size:56px;letter-spacing:10px;margin-bottom:10px;animation:eggWiggle 3s ease infinite}
@keyframes eggWiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(3deg)}75%{transform:rotate(-3deg)}}
.ttl{font-size:28px;font-weight:900;color:var(--pastel-yellow);margin:12px 0 4px;text-align:center}
.ttl .easter-accent{color:var(--pastel-pink)}
.sub{font-size:15px;font-weight:700;color:var(--muted);text-align:center;margin-bottom:6px;line-height:1.4}
.lang-badge{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.15);border-radius:50px;padding:12px 28px;margin:18px 0 30px}
.lang-badge span.flag{font-size:38px}
.lang-badge span.name{font-size:18px;font-weight:800}
.btn{border:none;border-radius:var(--r);padding:15px 52px;font-family:'Nunito',sans-serif;font-size:17px;font-weight:800;cursor:pointer;text-transform:uppercase;letter-spacing:1.2px;transition:transform .1s}
.btn:active{transform:translateY(2px)}
.btn-easter{background:var(--pastel-pink);color:#6a1b4d;border-bottom:4px solid #d4849e}
.btn-easter:active{border-bottom-width:2px}
.intro-float{position:absolute;opacity:.15;font-size:28px;animation:floatUp linear infinite;pointer-events:none}
@keyframes floatUp{0%{transform:translateY(100vh) rotate(0)}100%{transform:translateY(-60px) rotate(360deg)}}

/* QUIZ */
.quiz-bg{background:var(--easter-bg)}
/* Brand header on quiz */
.q-brand{width:100%;display:flex;align-items:center;justify-content:center;margin-bottom:14px}
.q-brand-name{font-size:30px;font-weight:900;color:var(--white);letter-spacing:.5px}
.q-top{width:100%;display:flex;align-items:center;gap:12px;margin-bottom:20px}
.pbar{flex:1;height:16px;background:rgba(255,255,255,.25);border-radius:10px;overflow:hidden}
.pfill{height:100%;background:var(--white);border-radius:10px;transition:width .5s ease}
.hearts{display:flex;align-items:center;gap:3px;font-weight:800;font-size:17px}
.hearts svg{width:24px;height:24px;fill:var(--white)}
.hc{color:var(--white)}
.q-num{font-size:13px;font-weight:700;color:rgba(255,255,255,.55);width:100%;text-align:left;margin-bottom:4px}
.q-prompt{font-size:21px;font-weight:800;width:100%;text-align:left;margin-bottom:6px;color:var(--white)}
.q-foreign{width:100%;display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.25);border-radius:var(--r);padding:14px 16px;margin-bottom:24px}
.q-speaker{width:42px;height:42px;background:var(--white);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:transform .15s}
.q-speaker:active{transform:scale(.9)}
.q-speaker svg{width:24px;height:24px;fill:var(--green-deep)}
.q-word{font-size:20px;font-weight:800;color:var(--white)}
.q-emoji{font-size:24px;margin-left:6px}

.opts{display:flex;flex-direction:column;gap:10px;width:100%;margin-bottom:20px}
.opt{background:rgba(255,255,255,.95);border:2px solid rgba(255,255,255,1);border-bottom:4px solid rgba(200,200,200,.6);border-radius:var(--r);padding:15px 18px;font-size:16px;font-weight:700;color:#333;cursor:pointer;transition:border-color .2s,background .2s,transform .12s;display:flex;align-items:center;gap:12px;-webkit-user-select:none;user-select:none}
.opt:active{transform:scale(.98)}
.opt .num{width:28px;height:28px;border-radius:8px;border:2px solid #ccc;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#999;flex-shrink:0}
.opt.sel{border-color:var(--blue);background:#e8f7ff;border-bottom-color:var(--blue)}
.opt.sel .num{border-color:var(--blue);color:var(--blue)}
.opt.ok{border-color:var(--green-deep);background:#e6ffe0;animation:pop .3s ease;border-bottom-color:var(--green-deep)}
.opt.ok .num{border-color:var(--green-deep);background:var(--green);color:var(--white)}
.opt.no{border-color:var(--red);background:#ffe8e8;animation:shk .35s ease;border-bottom-color:var(--red)}
.opt.no .num{border-color:var(--red);color:var(--red)}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.03)}100%{transform:scale(1)}}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

.chk{width:100%;padding:15px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;text-transform:uppercase;letter-spacing:1px;border:none;border-bottom:4px solid rgba(0,0,0,.15);border-radius:var(--r);background:rgba(255,255,255,.3);color:rgba(255,255,255,.5);cursor:default;transition:all .2s}
.chk.go{background:var(--white);border-bottom-color:#ccc;color:var(--green-deep);cursor:pointer}
.chk.go:active{transform:translateY(2px);border-bottom-width:2px}

.fb{position:absolute;bottom:0;left:0;right:0;padding:22px 24px;transform:translateY(100%);transition:transform .3s ease;z-index:10;display:flex;flex-direction:column;gap:14px}
.fb.show{transform:translateY(0)}
.fb.fb-ok{background:#2b7a00}
.fb.fb-no{background:#cc2200}
.fb-t{font-size:18px;font-weight:800;display:flex;align-items:center;gap:8px;color:var(--white)}
.fb-ans{font-size:14px;font-weight:700;color:rgba(255,255,255,.8)}
.cont{width:100%;padding:14px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;text-transform:uppercase;border:none;border-radius:var(--r);cursor:pointer;color:var(--white)}
.cont.c-ok{background:rgba(255,255,255,.25);border-bottom:4px solid rgba(0,0,0,.1)}
.cont.c-no{background:rgba(255,255,255,.25);border-bottom:4px solid rgba(0,0,0,.1)}

/* CTA */
.cta-bg{background:radial-gradient(ellipse at 50% 30%,#2d1b69 0%,#1a1035 70%)}
.trophy{font-size:72px;margin-bottom:6px}
.c-ttl{font-size:26px;font-weight:900;color:var(--pastel-yellow);text-align:center;margin-bottom:2px}
.c-sub{font-size:15px;font-weight:700;color:var(--muted);text-align:center;margin-bottom:28px}
.stats{display:flex;gap:20px;margin-bottom:32px}
.stat{text-align:center;background:rgba(255,255,255,.06);border-radius:var(--r);padding:16px 20px}
.stat-n{font-size:28px;font-weight:900;color:var(--green)}
.stat-l{font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:1.5px;margin-top:2px}
.c-owl{width:88px;margin-bottom:20px;animation:bob 2.5s ease infinite}
.dl{background:var(--pastel-pink);color:#6a1b4d;border:none;border-bottom:4px solid #d4849e;border-radius:var(--r);padding:16px 52px;font-family:'Nunito',sans-serif;font-size:18px;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;cursor:pointer;animation:glow 1.8s ease infinite}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(248,187,208,.4)}50%{box-shadow:0 0 0 12px rgba(248,187,208,0)}}
.dl:active{transform:translateY(2px);border-bottom-width:2px}
.store-hint{font-size:12px;color:var(--dim);margin-top:14px;font-weight:700}
.cta-eggs{font-size:40px;letter-spacing:8px;margin-top:16px;opacity:.4}
</style>
</head>
<body>
<div class="ad" id="ad">

<!-- SCREEN 1: INTRO -->
<div class="scr intro-bg on" id="s1">
  <div class="easter-eggs-deco">🥚🐣🐰</div>
  <img class="owl" id="owl1" alt="Duo">
  <div class="ttl">Easter <span class="easter-accent">Spanish</span> Quiz</div>
  <div class="sub">Learn Easter words in Spanish!<br>Can you translate them all?</div>
  <div class="lang-badge">
    <span class="flag">🇪🇸</span>
    <span class="name">Spanish</span>
  </div>
  <button class="btn btn-easter" onclick="playTap();go(2)">Start Quiz 🐣</button>
</div>

<!-- SCREEN 2: QUIZ -->
<div class="scr quiz-bg" id="s2">
  <div class="q-brand">
    <span class="q-brand-name">Duolingo</span>
  </div>
  <div class="q-top">
    <div class="pbar"><div class="pfill" id="pf"></div></div>
    <div class="hearts"><svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg><span class="hc" id="hc">5</span></div>
  </div>
  <div class="q-num" id="qnum"></div>
  <div class="q-prompt">Translate this word</div>
  <div class="q-foreign">
    <div class="q-speaker" onclick="speak()"><svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0014 8v8a4.47 4.47 0 002.5-4z"/></svg></div>
    <div class="q-word" id="qw"></div>
  </div>
  <div class="opts" id="opts"></div>
  <button class="chk" id="chk" onclick="check()">Check</button>
  <div class="fb" id="fb">
    <div class="fb-t" id="fbt"></div>
    <div class="fb-ans" id="fba"></div>
    <button class="cont" id="ctn" onclick="next()">Continue</button>
  </div>
</div>

<!-- SCREEN 3: CTA -->
<div class="scr cta-bg" id="s3">
  <div class="trophy">🐣</div>
  <div class="c-ttl">Happy Easter! 🎉</div>
  <div class="c-sub" id="csub"></div>
  <div class="stats">
    <div class="stat"><div class="stat-n" id="sS">0</div><div class="stat-l">Correct</div></div>
    <div class="stat"><div class="stat-n" id="sX">0</div><div class="stat-l">XP</div></div>
    <div class="stat"><div class="stat-n" id="sH">0</div><div class="stat-l">Hearts</div></div>
  </div>
  <img class="c-owl" id="owl2" alt="Duo">
  <button class="dl" onclick="handleCTA()">Download Now 🐰</button>
  <div class="store-hint">Free on iOS & Android</div>
  <div class="cta-eggs">🥚🌷🐇🌸🥚</div>
</div>

</div>
<script>
// ── Sound System (Web Audio API) — Rich & Musical ──
let actx=null;
function initAudio(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();if(actx.state==='suspended')actx.resume()}
document.addEventListener('click',initAudio,{once:true});
document.addEventListener('touchstart',initAudio,{once:true});

// Helper: play a note with harmonics and tail
function playNote(freq,type,vol,start,dur,detune){
  if(!actx)return;
  const o=actx.createOscillator(),g=actx.createGain();
  // Add subtle warmth with waveshaper
  const ws=actx.createWaveShaper();
  const curve=new Float32Array(256);
  for(let i=0;i<256;i++){const x=i*2/256-1;curve[i]=Math.tanh(x*1.5)}
  ws.curve=curve;ws.oversample='2x';
  o.connect(ws);ws.connect(g);g.connect(actx.destination);
  o.type=type||'sine';
  o.frequency.setValueAtTime(freq,start);
  if(detune)o.detune.setValueAtTime(detune,start);
  g.gain.setValueAtTime(0,start);
  g.gain.linearRampToValueAtTime(vol,start+0.015);
  g.gain.setValueAtTime(vol*0.8,start+dur*0.3);
  g.gain.exponentialRampToValueAtTime(0.001,start+dur);
  o.start(start);o.stop(start+dur);
}

function playTap(){
  if(!actx)return;const t=actx.currentTime;
  // Crisp pop with harmonic
  playNote(1200,'sine',0.12,t,0.07,0);
  playNote(800,'triangle',0.06,t+0.01,0.06,5);
}

function playSelect(){
  if(!actx)return;const t=actx.currentTime;
  // Bubbly two-tone pop
  playNote(520,'sine',0.1,t,0.12,0);
  playNote(780,'sine',0.07,t+0.04,0.1,8);
  // Tiny sparkle on top
  playNote(1560,'sine',0.03,t+0.05,0.08,0);
}

function playCorrect(){
  if(!actx)return;const t=actx.currentTime;
  // Joyful major chord arpeggio with shimmer — C5 E5 G5 C6
  const notes=[523.25,659.25,783.99,1046.5];
  notes.forEach((f,i)=>{
    const s=t+i*0.09;
    playNote(f,'sine',0.16,s,0.4,0);
    playNote(f*2,'sine',0.04,s+0.02,0.25,3); // octave shimmer
    playNote(f*1.005,'sine',0.06,s,0.35,0);  // slight chorus detune
  });
  // Sparkle burst at the end
  [1318,1568,2093].forEach((f,i)=>{
    playNote(f,'sine',0.025,t+0.4+i*0.04,0.15,0);
  });
}

function playWrong(){
  if(!actx)return;const t=actx.currentTime;
  // Dissonant minor second buzz — warm but clearly wrong
  playNote(290,'triangle',0.1,t,0.25,0);
  playNote(310,'sawtooth',0.04,t,0.2,0);
  playNote(220,'triangle',0.08,t+0.1,0.2,0);
  playNote(235,'sawtooth',0.03,t+0.1,0.18,0);
  // Low thud
  playNote(80,'sine',0.1,t,0.15,0);
}

function playComplete(){
  if(!actx)return;const t=actx.currentTime;
  // Triumphant fanfare — rich layered arpeggio
  const fanfare=[
    {f:523.25,t:0},{f:659.25,t:0.1},{f:783.99,t:0.2},
    {f:1046.5,t:0.35},{f:1318.5,t:0.45},{f:1568,t:0.5}
  ];
  fanfare.forEach(n=>{
    const s=t+n.t;
    playNote(n.f,'sine',0.15,s,0.55,0);
    playNote(n.f*2,'sine',0.04,s+0.02,0.35,5);
    playNote(n.f*0.998,'sine',0.06,s,0.5,0); // chorus
  });
  // Final shimmering chord
  [1046.5,1318.5,1568,2093].forEach((f,i)=>{
    playNote(f,'sine',0.05,t+0.6,0.8,i*3);
  });
  // Sparkle cascade
  for(let i=0;i<6;i++){
    playNote(2000+Math.random()*2000,'sine',0.015,t+0.7+i*0.06,0.12,0);
  }
}

// ── Floating Easter decorations ──
function spawnFloaters(){
  const emojis=['🥚','🐣','🌷','🐰','🌸','🪺','🐇'];
  const container=document.getElementById('s1');
  for(let i=0;i<10;i++){
    const el=document.createElement('div');
    el.className='intro-float';
    el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    el.style.left=Math.random()*90+'%';
    el.style.fontSize=(20+Math.random()*18)+'px';
    el.style.animationDuration=(6+Math.random()*8)+'s';
    el.style.animationDelay=(-Math.random()*12)+'s';
    container.appendChild(el);
  }
}

document.getElementById("owl1").src="data:image/webp;base64,"+L;
document.getElementById("owl2").src="data:image/webp;base64,"+L;

const QS=[
  {word:"el conejo",emoji:"🐰",correct:"the rabbit",opts:["the rabbit","the chicken","the lamb","the duck"]},
  {word:"el huevo",emoji:"🥚",correct:"the egg",opts:["the nest","the egg","the basket","the shell"]},
  {word:"la primavera",emoji:"🌸",correct:"the spring",opts:["the spring","the summer","the winter","the autumn"]},
  {word:"el chocolate",emoji:"🍫",correct:"the chocolate",opts:["the candy","the cake","the chocolate","the cookie"]},
  {word:"la flor",emoji:"🌷",correct:"the flower",opts:["the flower","the tree","the garden","the grass"]}
];

let qi=0,sel=null,score=0,hearts=5,done=false;

function go(n){
  document.querySelectorAll('.scr').forEach(s=>{
    if(s.classList.contains('on')){s.classList.remove('on');s.classList.add('off');setTimeout(()=>s.classList.remove('off'),500)}
  });
  setTimeout(()=>document.getElementById('s'+n).classList.add('on'),100);
  if(n===2)loadQ();
}

function loadQ(){
  const q=QS[qi];done=false;sel=null;
  document.getElementById('qnum').textContent='🇪🇸 Spanish · Question '+(qi+1)+' of '+QS.length;
  document.getElementById('qw').innerHTML=q.word+' <span class="q-emoji">'+q.emoji+'</span>';
  document.getElementById('pf').style.width=(qi/QS.length*100)+'%';
  document.getElementById('chk').className='chk';
  document.getElementById('fb').className='fb';
  const o=document.getElementById('opts');o.innerHTML='';
  const sh=[...q.opts].sort(()=>Math.random()-.5);
  sh.forEach((t,i)=>{
    const d=document.createElement('div');d.className='opt';
    d.innerHTML='<div class="num">'+(i+1)+'</div><span>'+t+'</span>';
    d.addEventListener('click',()=>pick(d,t));
    o.appendChild(d);
  });
}

function pick(el,val){
  if(done)return;
  playSelect();
  document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
  el.classList.add('sel');sel=val;
  document.getElementById('chk').className='chk go';
}

function speak(){
  if('speechSynthesis' in window){
    const u=new SpeechSynthesisUtterance(QS[qi].word);
    u.lang='es-ES';speechSynthesis.speak(u);
  }
}

function check(){
  if(!sel||done)return;playTap();done=true;
  const q=QS[qi],ok=sel===q.correct;
  document.querySelectorAll('.opt').forEach(o=>{
    const t=o.querySelector('span').textContent;
    if(t===q.correct)o.classList.add('ok');
    else if(o.classList.contains('sel')&&!ok)o.classList.add('no');
  });
  if(ok){score++;playCorrect()}else{hearts--;document.getElementById('hc').textContent=hearts;playWrong()}
  const fb=document.getElementById('fb');
  const fbt=document.getElementById('fbt');
  const fba=document.getElementById('fba');
  const ctn=document.getElementById('ctn');
  if(ok){
    fb.className='fb show fb-ok';
    fbt.innerHTML='✅ Correct! '+q.emoji;fba.textContent='';
    ctn.className='cont c-ok';
  } else {
    fb.className='fb show fb-no';
    fbt.innerHTML='❌ Incorrect';
    fba.textContent='Answer: '+q.correct+' '+q.emoji;
    ctn.className='cont c-no';
  }
}

function next(){
  playTap();qi++;
  if(qi>=QS.length){
    document.getElementById('pf').style.width='100%';
    document.getElementById('sS').textContent=score+'/'+QS.length;
    document.getElementById('sX').textContent=score*15;
    document.getElementById('sH').textContent=hearts+'❤️';
    const pct=Math.round(score/QS.length*100);
    document.getElementById('csub').textContent=
      pct===100?"Perfect egg hunt! You're a language genius! 🥚✨":
      pct>=60?score+' out of '+QS.length+' — great egg hunting! 🐣':
      score+' out of '+QS.length+' — keep searching for eggs! 🥚';
    setTimeout(()=>{playComplete();go(3)},250);
  } else { loadQ(); }
}

function handleCTA(){playTap();window.open('https://apps.apple.com/app/duolingo/id570060128','_blank')}
</script>
