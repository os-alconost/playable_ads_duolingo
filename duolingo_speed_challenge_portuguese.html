<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="ad.size" content="width=360,height=640">
<title>Duolingo Speed Challenge</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --green:#58CC02;--green-dk:#46a302;--green-deep:#2b7a00;
  --bg:#131F24;
  --white:#fff;--muted:rgba(255,255,255,.72);--dim:rgba(255,255,255,.35);
  --red:#FF4B4B;--blue:#1CB0F6;--gold:#FFC800;
  --r:16px;
}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Nunito',sans-serif;background:var(--bg);color:var(--white)}
.ad{width:100%;height:100%;max-width:420px;margin:0 auto;position:relative;overflow:hidden}

.scr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 24px;opacity:0;pointer-events:none;transition:opacity .45s,transform .45s;transform:translateX(50px)}
.scr.on{opacity:1;pointer-events:auto;transform:translateX(0)}
.scr.off{opacity:0;transform:translateX(-50px)}

/* INTRO */
.intro-bg{background:var(--bg)}
.owl{width:140px;animation:bob 2.5s ease infinite}
@keyframes bob{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-8px) rotate(-3deg)}}
.ttl{font-size:28px;font-weight:900;color:var(--green);margin:16px 0 4px;text-align:center}
.ttl .accent{color:var(--gold)}
.sub{font-size:15px;font-weight:700;color:var(--muted);text-align:center;margin-bottom:6px;line-height:1.4}
.speed-badge{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.15);border-radius:50px;padding:12px 28px;margin:18px 0 30px}
.speed-badge span.icon{font-size:28px}
.speed-badge span.label{font-size:16px;font-weight:800}
.btn{border:none;border-radius:var(--r);padding:15px 52px;font-family:'Nunito',sans-serif;font-size:17px;font-weight:800;cursor:pointer;text-transform:uppercase;letter-spacing:1.2px;transition:transform .1s}
.btn:active{transform:translateY(2px)}
.btn-g{background:var(--green);color:var(--white);border-bottom:4px solid var(--green-dk)}
.btn-g:active{border-bottom-width:2px}

/* GAME */
.game-bg{background:linear-gradient(180deg,#58CC02 0%,#3da600 100%);justify-content:flex-start;padding-top:16px}
.g-brand{width:100%;text-align:center;margin-bottom:6px}
.g-brand-name{font-size:30px;font-weight:900;color:var(--white);letter-spacing:.5px}
.g-hud{width:100%;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:10px}
.g-timer-wrap{flex:1;height:18px;background:rgba(255,255,255,.25);border-radius:10px;overflow:hidden;position:relative}
.g-timer-bar{height:100%;background:var(--white);border-radius:10px;transition:width .1s linear;width:100%}
.g-timer-bar.warn{background:var(--gold)}
.g-timer-bar.danger{background:var(--red)}
.g-timer-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--green-deep);mix-blend-mode:multiply}
.g-score{display:flex;align-items:center;gap:6px;font-weight:800;font-size:18px;color:var(--white);min-width:60px;justify-content:flex-end}
.g-score svg{width:22px;height:22px}
.g-streak{font-size:13px;font-weight:800;color:rgba(255,255,255,.6);text-align:center;margin-bottom:8px;min-height:20px}
.g-streak.hot{color:var(--gold);animation:streakPop .3s ease}
@keyframes streakPop{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}

.g-word-container{width:100%;text-align:center;margin-bottom:20px;min-height:110px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.g-emoji{font-size:40px;margin-bottom:6px}
.g-foreign{font-size:28px;font-weight:900;color:var(--white);text-shadow:0 2px 8px rgba(0,0,0,.2)}
.g-foreign.pop-in{animation:wordPop .35s ease}
@keyframes wordPop{0%{transform:scale(.5) translateY(20px);opacity:0}100%{transform:scale(1) translateY(0);opacity:1}}
.g-hint{font-size:13px;color:rgba(255,255,255,.5);margin-top:4px}

.g-opts{display:flex;flex-direction:column;gap:10px;width:100%}
.g-opt{background:rgba(255,255,255,.95);border:2px solid rgba(255,255,255,1);border-bottom:4px solid rgba(200,200,200,.6);border-radius:var(--r);padding:16px 20px;font-size:17px;font-weight:700;color:#333;cursor:pointer;transition:border-color .15s,background .15s,transform .1s;text-align:center;-webkit-user-select:none;user-select:none}
.g-opt:active{transform:scale(.97)}
.g-opt.ok{border-color:var(--green-deep);background:#e6ffe0;border-bottom-color:var(--green-deep);animation:pop .25s ease}
.g-opt.no{border-color:var(--red);background:#ffe8e8;border-bottom-color:var(--red);animation:shk .3s ease}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.04)}100%{transform:scale(1)}}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

.g-combo{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:48px;font-weight:900;color:var(--gold);text-shadow:0 4px 20px rgba(0,0,0,.4);pointer-events:none;opacity:0;z-index:20}

.g-bottom{margin-top:auto;display:flex;align-items:center;gap:10px;padding-bottom:4px}
.g-owl{width:76px;height:76px;object-fit:contain;transition:transform .3s ease}
.g-owl.happy{animation:owlJump .4s ease}
.g-owl.sad{animation:owlShake .4s ease}
@keyframes owlJump{0%{transform:translateY(0)}40%{transform:translateY(-12px) rotate(-5deg)}100%{transform:translateY(0)}}
@keyframes owlShake{0%,100%{transform:rotate(0)}30%{transform:rotate(-8deg)}60%{transform:rotate(8deg)}}
.g-cheer{font-size:16px;font-weight:800;color:rgba(255,255,255,.75);transition:all .3s ease}
.g-combo.show{animation:comboFlash .6s ease forwards}
@keyframes comboFlash{0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}30%{opacity:1;transform:translate(-50%,-50%) scale(1.2)}100%{opacity:0;transform:translate(-50%,-60%) scale(1)}}

/* CTA */
.cta-bg{background:radial-gradient(ellipse at 50% 40%,#1a3a20 0%,var(--bg) 70%)}
.trophy{font-size:72px;margin-bottom:6px}
.c-ttl{font-size:26px;font-weight:900;color:var(--gold);text-align:center;margin-bottom:2px}
.c-sub{font-size:15px;font-weight:700;color:var(--muted);text-align:center;margin-bottom:24px}
.stats{display:flex;gap:14px;margin-bottom:28px;flex-wrap:wrap;justify-content:center}
.stat{text-align:center;background:rgba(255,255,255,.06);border-radius:var(--r);padding:14px 18px;min-width:80px}
.stat-n{font-size:26px;font-weight:900;color:var(--green)}
.stat-l{font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:1.5px;margin-top:2px}
.c-owl{width:88px;margin-bottom:20px;animation:bob 2.5s ease infinite}
.dl{background:var(--green);color:white;border:none;border-bottom:4px solid var(--green-dk);border-radius:var(--r);padding:16px 52px;font-family:'Nunito',sans-serif;font-size:18px;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;cursor:pointer;animation:glow 1.8s ease infinite}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 #58cc0255}50%{box-shadow:0 0 0 12px #58cc0200}}
.dl:active{transform:translateY(2px);border-bottom-width:2px}
.store-hint{font-size:12px;color:var(--dim);margin-top:12px;font-weight:700}
</style>
</head>
<body>
<div class="ad" id="ad">

<!-- SCREEN 1: INTRO -->
<div class="scr intro-bg on" id="s1">
  <img class="owl" id="owl1" alt="Duo">
  <div class="ttl">🇧🇷 <span class="accent">Portuguese</span> Speed Challenge</div>
  <div class="sub">Translate as many words as you can<br>before time runs out!</div>
  <div class="speed-badge">
    <span class="icon">⚡</span>
    <span class="label">30 seconds</span>
  </div>
  <button class="btn btn-g" onclick="playTap();go(2)">GO!</button>
</div>

<!-- SCREEN 2: GAME -->
<div class="scr game-bg" id="s2">
  <div class="g-brand"><span class="g-brand-name">Duolingo</span></div>
  <div class="g-hud">
    <div class="g-timer-wrap">
      <div class="g-timer-bar" id="tbar"></div>
      <div class="g-timer-text" id="ttext">30s</div>
    </div>
    <div class="g-score"><svg viewBox="0 0 24 24" fill="var(--gold)"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg><span id="gsc">0</span></div>
  </div>
  <div class="g-streak" id="gstreak"></div>
  <div class="g-word-container">
    <div class="g-emoji" id="gemoji"></div>
    <div class="g-foreign pop-in" id="gword"></div>
    <div class="g-hint">🇧🇷 Portuguese → English</div>
  </div>
  <div class="g-opts" id="gopts"></div>
  <div class="g-bottom">
    <img class="g-owl" id="owl3" alt="Duo">
    <div class="g-cheer" id="gcheer">Let's go!</div>
  </div>
  <div class="g-combo" id="gcombo"></div>
</div>

<!-- SCREEN 3: CTA -->
<div class="scr cta-bg" id="s3">
  <div class="trophy">🏆</div>
  <div class="c-ttl">Time's Up! 🎉</div>
  <div class="c-sub" id="csub"></div>
  <div class="stats">
    <div class="stat"><div class="stat-n" id="sS">0</div><div class="stat-l">Correct</div></div>
    <div class="stat"><div class="stat-n" id="sX">0</div><div class="stat-l">XP</div></div>
    <div class="stat"><div class="stat-n" id="sT">0</div><div class="stat-l">Best Streak</div></div>
    <div class="stat"><div class="stat-n" id="sW">0</div><div class="stat-l">Words/Min</div></div>
  </div>
  <img class="c-owl" id="owl2" alt="Duo">
  <button class="dl" onclick="handleCTA()">Download Now</button>
  <div class="store-hint">Free on iOS & Android</div>
</div>

</div>
<script>
// ── Sound System ──
let actx=null;
function initAudio(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();if(actx.state==='suspended')actx.resume()}
document.addEventListener('click',initAudio,{once:true});
document.addEventListener('touchstart',initAudio,{once:true});

function playNote(freq,type,vol,start,dur,detune){
  if(!actx)return;
  const o=actx.createOscillator(),g=actx.createGain();
  const ws=actx.createWaveShaper();
  const curve=new Float32Array(256);
  for(let i=0;i<256;i++){const x=i*2/256-1;curve[i]=Math.tanh(x*1.5)}
  ws.curve=curve;ws.oversample='2x';
  o.connect(ws);ws.connect(g);g.connect(actx.destination);
  o.type=type||'sine';
  o.frequency.setValueAtTime(freq,start);
  if(detune)o.detune.setValueAtTime(detune,start);
  g.gain.setValueAtTime(0,start);
  g.gain.linearRampToValueAtTime(vol,start+0.015);
  g.gain.setValueAtTime(vol*0.8,start+dur*0.3);
  g.gain.exponentialRampToValueAtTime(0.001,start+dur);
  o.start(start);o.stop(start+dur);
}
function playTap(){if(!actx)return;const t=actx.currentTime;playNote(1200,'sine',0.12,t,0.07,0);playNote(800,'triangle',0.06,t+0.01,0.06,5)}
function playCorrect(){
  if(!actx)return;const t=actx.currentTime;
  [523.25,659.25,783.99,1046.5].forEach((f,i)=>{
    playNote(f,'sine',0.16,t+i*0.06,0.3,0);
    playNote(f*2,'sine',0.04,t+i*0.06+0.02,0.2,3);
  });
}
function playWrong(){
  if(!actx)return;const t=actx.currentTime;
  playNote(290,'triangle',0.1,t,0.2,0);playNote(220,'triangle',0.08,t+0.08,0.18,0);
  playNote(80,'sine',0.1,t,0.12,0);
}
function playStreak(){
  if(!actx)return;const t=actx.currentTime;
  [783.99,1046.5,1318.5].forEach((f,i)=>{
    playNote(f,'sine',0.12,t+i*0.05,0.2,0);
    playNote(f*1.5,'sine',0.03,t+i*0.05,0.15,5);
  });
}
function playTick(){
  if(!actx)return;const t=actx.currentTime;
  playNote(1800,'sine',0.06,t,0.04,0);
}
function playTimeUp(){
  if(!actx)return;const t=actx.currentTime;
  [784,659,523,392].forEach((f,i)=>{
    playNote(f,'triangle',0.12,t+i*0.15,0.3,0);
  });
}
function playComplete(){
  if(!actx)return;const t=actx.currentTime;
  [523.25,659.25,783.99,1046.5,1318.5,1568].forEach((f,i)=>{
    playNote(f,'sine',0.15,t+i*0.1,0.5,0);
    playNote(f*2,'sine',0.04,t+i*0.1+0.02,0.3,5);
  });
  for(let i=0;i<6;i++)playNote(2000+Math.random()*2000,'sine',0.015,t+0.7+i*0.06,0.12,0);
}

// ── Word Bank (Portuguese → English) ──
const WORDS=[
  {word:"o gato",emoji:"🐱",answer:"the cat",wrongs:["the dog","the bird","the fish"]},
  {word:"a casa",emoji:"🏠",answer:"the house",wrongs:["the car","the school","the park"]},
  {word:"o livro",emoji:"📖",answer:"the book",wrongs:["the pen","the desk","the paper"]},
  {word:"a água",emoji:"💧",answer:"the water",wrongs:["the juice","the milk","the coffee"]},
  {word:"o sol",emoji:"☀️",answer:"the sun",wrongs:["the moon","the star","the cloud"]},
  {word:"a flor",emoji:"🌷",answer:"the flower",wrongs:["the tree","the grass","the leaf"]},
  {word:"o pão",emoji:"🍞",answer:"the bread",wrongs:["the cake","the rice","the cheese"]},
  {word:"a praia",emoji:"🏖️",answer:"the beach",wrongs:["the mountain","the forest","the lake"]},
  {word:"o coração",emoji:"❤️",answer:"the heart",wrongs:["the brain","the hand","the eye"]},
  {word:"a música",emoji:"🎵",answer:"the music",wrongs:["the movie","the dance","the song"]},
  {word:"o cão",emoji:"🐶",answer:"the dog",wrongs:["the cat","the horse","the rabbit"]},
  {word:"a lua",emoji:"🌙",answer:"the moon",wrongs:["the sun","the star","the sky"]},
  {word:"o café",emoji:"☕",answer:"the coffee",wrongs:["the tea","the juice","the water"]},
  {word:"a borboleta",emoji:"🦋",answer:"the butterfly",wrongs:["the bee","the moth","the bird"]},
  {word:"o amigo",emoji:"🤝",answer:"the friend",wrongs:["the teacher","the brother","the neighbor"]},
  {word:"a cidade",emoji:"🏙️",answer:"the city",wrongs:["the village","the country","the island"]},
  {word:"o tempo",emoji:"⏰",answer:"the time",wrongs:["the day","the year","the clock"]},
  {word:"a comida",emoji:"🍽️",answer:"the food",wrongs:["the drink","the meal","the plate"]},
  {word:"o sonho",emoji:"💭",answer:"the dream",wrongs:["the sleep","the thought","the wish"]},
  {word:"a estrela",emoji:"⭐",answer:"the star",wrongs:["the moon","the sun","the planet"]}
];

const TOTAL_TIME=30;
let score=0,streak=0,bestStreak=0,timeLeft=TOTAL_TIME,timer=null,wordIdx=0,answered=false,totalAnswered=0;
let shuffled=[];

function go(n){
  document.querySelectorAll('.scr').forEach(s=>{
    if(s.classList.contains('on')){s.classList.remove('on');s.classList.add('off');setTimeout(()=>s.classList.remove('off'),500)}
  });
  setTimeout(()=>document.getElementById('s'+n).classList.add('on'),100);
  if(n===2)startGame();
}

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function startGame(){
  score=0;streak=0;bestStreak=0;timeLeft=TOTAL_TIME;wordIdx=0;totalAnswered=0;
  shuffled=shuffle(WORDS);
  document.getElementById('gsc').textContent='0';
  document.getElementById('gstreak').textContent='';
  loadWord();
  timer=setInterval(tick,100);
}

function tick(){
  timeLeft-=0.1;
  if(timeLeft<=0){timeLeft=0;clearInterval(timer);endGame();return}
  const pct=(timeLeft/TOTAL_TIME)*100;
  const bar=document.getElementById('tbar');
  bar.style.width=pct+'%';
  bar.className='g-timer-bar'+(pct<20?' danger':pct<40?' warn':'');
  document.getElementById('ttext').textContent=Math.ceil(timeLeft)+'s';
  if(timeLeft<=5&&timeLeft>4.9)playTick();
  if(timeLeft<=4&&timeLeft>3.9)playTick();
  if(timeLeft<=3&&timeLeft>2.9)playTick();
  if(timeLeft<=2&&timeLeft>1.9)playTick();
  if(timeLeft<=1&&timeLeft>0.9)playTick();
}

function loadWord(){
  answered=false;
  if(wordIdx>=shuffled.length){shuffled=shuffle(WORDS);wordIdx=0}
  const w=shuffled[wordIdx];
  
  const wordEl=document.getElementById('gword');
  wordEl.textContent=w.word;
  wordEl.className='g-foreign pop-in';
  document.getElementById('gemoji').textContent=w.emoji;
  
  const opts=[w.answer,...shuffle(w.wrongs).slice(0,2)];
  const sOpts=shuffle(opts);
  
  const container=document.getElementById('gopts');
  container.innerHTML='';
  sOpts.forEach(text=>{
    const d=document.createElement('div');
    d.className='g-opt';
    d.textContent=text;
    d.addEventListener('click',()=>pickAnswer(d,text,w.answer));
    container.appendChild(d);
  });
}

function pickAnswer(el,picked,correct){
  if(answered||timeLeft<=0)return;
  answered=true;
  const owlEl=document.getElementById('owl3');
  const cheerEl=document.getElementById('gcheer');
  
  if(picked===correct){
    el.classList.add('ok');
    streak++;
    if(streak>bestStreak)bestStreak=streak;
    const bonus=streak>=5?25:streak>=3?15:10;
    score+=bonus;
    totalAnswered++;
    document.getElementById('gsc').textContent=score;
    playCorrect();
    
    // Owl cheers
    owlEl.className='g-owl happy';setTimeout(()=>owlEl.className='g-owl',400);
    const cheers=streak>=5?['Unstoppable! 🔥','On fire!! 🔥','Legendary! ⚡']:
      streak>=3?['Amazing! ⚡','Keep going! 💪','Wow! 🌟']:
      ['Nice! 👏','Great! ✨','Yes! 💚','Correct! 🎉'];
    cheerEl.textContent=cheers[Math.floor(Math.random()*cheers.length)];
    
    const streakEl=document.getElementById('gstreak');
    if(streak>=5){
      streakEl.textContent='🔥 ON FIRE! '+streak+' streak! +25';
      streakEl.className='g-streak hot';
      if(streak===5||streak===10)playStreak();
    } else if(streak>=3){
      streakEl.textContent='⚡ '+streak+' streak! +15';
      streakEl.className='g-streak hot';
      if(streak===3)playStreak();
    } else {
      streakEl.textContent='✓ +10';
      streakEl.className='g-streak';
    }
    
    if(streak===5||streak===10||streak===15){
      showCombo(streak+'x 🔥');
    }
    
    if(streak>=3){timeLeft=Math.min(timeLeft+0.5,TOTAL_TIME)}
    
  } else {
    el.classList.add('no');
    streak=0;
    playWrong();
    document.getElementById('gstreak').textContent='✗ Wrong!';
    document.getElementById('gstreak').className='g-streak';
    document.querySelectorAll('.g-opt').forEach(o=>{
      if(o.textContent===correct)o.classList.add('ok');
    });
    
    // Owl reacts sad
    owlEl.className='g-owl sad';setTimeout(()=>owlEl.className='g-owl',400);
    const sadMsgs=['Try again! 💪','You got this! 🤗','Keep going! 🙌','Don\'t give up! ✊'];
    cheerEl.textContent=sadMsgs[Math.floor(Math.random()*sadMsgs.length)];
  }
  
  wordIdx++;
  setTimeout(loadWord,streak>0?400:700);
}

function showCombo(text){
  const el=document.getElementById('gcombo');
  el.textContent=text;
  el.className='g-combo show';
  setTimeout(()=>el.className='g-combo',700);
}

function endGame(){
  playTimeUp();
  setTimeout(()=>{
    document.getElementById('sS').textContent=totalAnswered;
    document.getElementById('sX').textContent=score;
    document.getElementById('sT').textContent=bestStreak+'🔥';
    const wpm=Math.round(totalAnswered*2);
    document.getElementById('sW').textContent=wpm;
    
    let msg;
    if(totalAnswered>=12) msg="Incredible speed! You're a natural linguist! ⚡";
    else if(totalAnswered>=8) msg="Great reflexes! "+totalAnswered+" words in 30 seconds!";
    else if(totalAnswered>=5) msg="Nice start! Can you beat "+totalAnswered+" next time?";
    else msg="Keep practicing — you'll get faster!";
    document.getElementById('csub').textContent=msg;
    
    playComplete();
    go(3);
  },600);
}

function handleCTA(){playTap();window.open('https://apps.apple.com/app/duolingo/id570060128','_blank')}
</script>
